<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetTrack — Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --felt:#0a3d2c;
  --felt2:#0e4a36;
  --felt3:#125640;
  --felt4:#17654b;
  --felt5:#1d7256;
  --border:#1a6049;
  --border2:#27795e;
  --border-gold:rgba(212,175,55,.35);
  --border-gold2:rgba(212,175,55,.6);
  --gold:#d4af37;
  --gold2:#f0d055;
  --gold3:#c9a83e;
  --gold-bg:rgba(212,175,55,.1);
  --gold-bg2:rgba(212,175,55,.18);
  --cream:#f4f0e2;
  --cream2:#c4ceb8;
  --cream3:#7e9586;
  --win:#00e676;
  --win2:#00c853;
  --win-bg:rgba(0,230,118,.12);
  --win-border:rgba(0,230,118,.4);
  --lose:#ff5b5b;
  --lose2:#d63434;
  --lose-bg:rgba(255,91,91,.12);
  --lose-border:rgba(255,91,91,.4);
  --blue:#5b9dee;
  --blue-bg:rgba(91,157,238,.12);
  --amber:#ffb52e;
  --amber-bg:rgba(255,181,46,.12);
  --purple:#a77dff;
  --purple-bg:rgba(167,125,255,.12);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-gold:0 0 24px rgba(212,175,55,.15);
  --r:12px;--rs:8px;
  --emerald:var(--win);
  --rose:var(--lose);
  --gray-400:var(--cream3);
}

html,body{
  height:100%;
  font-family:'Inter',system-ui,sans-serif;
  font-size:13px;line-height:1.5;
  background:var(--felt);
  color:var(--cream);
}
button,input,select,textarea{font-family:inherit;font-size:13px;outline:none}
button{cursor:pointer;border:none;background:none}
input[type=number]::-webkit-inner-spin-button{opacity:.4}

/* Felt dot texture */
.felt-texture{
  background-image:radial-gradient(circle,rgba(212,175,55,.04) 1px,transparent 1px);
  background-size:20px 20px;
}

/* ── APP ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  background:linear-gradient(180deg,#072e21 0%,var(--felt2) 100%);
  border-bottom:1px solid var(--border-gold);
  padding:0 24px;
  height:58px;
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
  position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.5;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-suits{font-size:11px;letter-spacing:2px;color:var(--gold3)}
.logo-text{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  color:var(--cream);letter-spacing:.5px;
}
.logo-text em{color:var(--gold);font-style:normal}
.topbar-sep{width:1px;height:22px;background:var(--border2)}
.topbar-badge{
  font-size:10px;font-weight:600;color:var(--cream3);
  letter-spacing:.1em;text-transform:uppercase;
}
.saldo-widget{
  margin-left:auto;
  display:flex;align-items:center;gap:10px;
  background:var(--felt3);
  border:1px solid var(--border-gold);
  border-radius:24px;padding:6px 14px 6px 10px;
  box-shadow:var(--shadow-gold);
}
.saldo-coin{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(212,175,55,.3);
}
.saldo-info{display:flex;flex-direction:column;gap:0;min-width:80px}
.saldo-lbl{font-size:9px;color:var(--cream3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.saldo-val{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;line-height:1.2}
.saldo-val.pos{color:var(--gold2)}
.saldo-val.neg{color:var(--lose)}
.saldo-committed{font-size:10px;color:var(--cream3);font-family:'DM Mono',monospace;line-height:1.3}
.saldo-committed.has-val{color:var(--amber)}
.saldo-edit-btn{
  width:26px;height:26px;border-radius:50%;
  border:1px solid var(--border2);color:var(--cream3);
  font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.saldo-edit-btn:hover{border-color:var(--gold);color:var(--gold)}
.topbar-tools{display:flex;gap:6px;margin-left:4px}
.tool-btn{
  background:var(--felt3);border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream2);
  padding:6px 11px;font-size:11px;font-weight:600;
  transition:.2s;white-space:nowrap;
}
.tool-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--felt4)}

/* ── TABS ── */
.tabs-nav{
  background:var(--felt2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;align-items:flex-end;
  overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
  gap:0;
}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  color:var(--cream3);
  padding:10px 18px;
  font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;
  transition:.2s;
  display:flex;align-items:center;gap:7px;
}
.tab-btn:hover{color:var(--cream2);background:rgba(255,255,255,.02)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.tab-btn.global-tab.active{color:var(--cream);border-bottom-color:var(--cream)}
.tab-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--border2);flex-shrink:0;transition:.2s;
}
.tab-btn.active .tab-dot{background:var(--gold)}
.tab-btn.global-tab.active .tab-dot{background:var(--cream)}
.tab-add-btn{
  background:transparent;
  border:1px dashed var(--border2);color:var(--cream3);
  border-radius:var(--rs);padding:4px 12px;
  font-size:11px;font-weight:500;
  margin:auto 0 6px 10px;transition:.2s;
}
.tab-add-btn:hover{border-color:var(--gold);color:var(--gold);border-style:solid}

/* ── MAIN ── */
.main{
  flex:1;overflow-y:auto;padding:22px;
  background:var(--felt);
  background-image:radial-gradient(circle,rgba(212,175,55,.055) 1px,transparent 1px);
  background-size:20px 20px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px}
.stat-card{
  background:var(--felt2);
  border:1px solid var(--border);
  border-top:2px solid var(--gold3);
  border-radius:var(--r);
  padding:14px 16px;
  position:relative;overflow:hidden;
  transition:.2s;
}
.stat-card:hover{border-color:var(--border2);border-top-color:var(--gold)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:40px;
  background:linear-gradient(180deg,var(--gold-bg) 0%,transparent 100%);
  pointer-events:none;
}
.stat-val{
  font-size:20px;font-weight:600;line-height:1.1;
  margin-bottom:4px;
  font-family:'DM Mono',monospace;letter-spacing:-.5px;
  position:relative;
}
.stat-val.pos{color:var(--gold2)}
.stat-val.gold{color:var(--gold2)}
.stat-val.win{color:var(--win)}
.stat-val.lose{color:var(--lose)}
.stat-val.blue{color:var(--blue)}
.stat-val.muted{color:var(--cream2)}
.stat-lbl{font-size:10px;color:var(--cream3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;position:relative}

/* ── SEC TITLE ── */
.sec-title{
  font-size:10px;color:var(--gold3);
  text-transform:uppercase;letter-spacing:.12em;font-weight:700;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge-win{background:var(--win-bg);color:var(--win);border:1px solid var(--win-border)}
.badge-lose{background:var(--lose-bg);color:var(--lose);border:1px solid var(--lose-border)}
.badge-gold{background:var(--gold-bg2);color:var(--gold2);border:1px solid var(--border-gold)}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,141,238,.3)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(155,109,255,.3)}
.badge-muted{background:var(--felt3);color:var(--cream3);border:1px solid var(--border2)}

/* ── STRAT HEADER ── */
.strat-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.strat-name-inp{
  background:transparent;border:none;
  border-bottom:1px solid var(--border2);
  color:var(--cream);
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;
  padding:2px 2px 5px;
  min-width:140px;max-width:320px;
  transition:.2s;letter-spacing:.3px;
}
.strat-name-inp:focus{border-bottom-color:var(--gold);outline:none}
.del-strat-btn{
  margin-left:auto;border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream3);
  padding:5px 12px;font-size:11px;font-weight:500;transition:.2s;
  display:flex;align-items:center;gap:5px;
}
.del-strat-btn:hover{border-color:var(--lose-border);color:var(--lose);background:var(--lose-bg)}

/* ── CONFIG BAR ── */
.config-bar{
  background:var(--felt2);
  border:1px solid var(--border);
  border-left:3px solid var(--gold3);
  border-radius:var(--r);
  padding:14px 18px;margin-bottom:22px;
  display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;
}
.cfg-grp{display:flex;flex-direction:column;gap:5px}
.cfg-lbl{font-size:10px;color:var(--gold3);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.cfg-inp{
  background:var(--felt3);border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream);
  padding:6px 10px;width:96px;font-weight:500;transition:.2s;
}
.cfg-inp:focus{border-color:var(--gold);background:var(--felt4);box-shadow:0 0 0 3px rgba(212,175,55,.1)}
.next-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--win-bg);border:1px solid var(--win-border);
  border-radius:var(--rs);padding:6px 14px;
  color:var(--win);font-weight:700;font-size:14px;
  font-family:'DM Mono',monospace;white-space:nowrap;
}
.next-pill.warn{background:var(--amber-bg);border-color:rgba(245,166,35,.4);color:var(--amber)}

/* ── RETO CARDS ── */
.retos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:22px}
.reto-card{
  background:var(--felt2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 15px;
  position:relative;overflow:hidden;
  transition:border-color .25s,box-shadow .25s;
}
.reto-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .25s;
}
.reto-card:not(.dead):not(.completed):hover::before{opacity:.6}
.reto-card:not(.dead):not(.completed):hover{
  border-color:var(--border-gold);
  box-shadow:0 0 20px rgba(212,175,55,.08);
}
.reto-card.dead{opacity:.35;filter:grayscale(1)}
.reto-card.completed{
  border-color:var(--border-gold);
  background:linear-gradient(135deg,rgba(212,175,55,.06) 0%,var(--felt2) 60%);
}
.reto-card.warn-card{border-color:rgba(245,166,35,.4)}

/* Card corner decoration */
.reto-card-corner{
  position:absolute;top:8px;right:10px;
  font-size:16px;opacity:.08;
  font-family:'Playfair Display',serif;
}
.reto-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.reto-num{font-size:10px;color:var(--cream3);font-weight:700;font-family:'DM Mono',monospace;letter-spacing:.05em}
.reto-step-big{
  font-size:36px;font-weight:700;line-height:1;
  font-family:'Playfair Display',serif;
  margin-bottom:1px;letter-spacing:-1px;
}
.reto-step-big.alive{color:var(--cream)}
.reto-step-big.warn-step{color:var(--amber)}
.reto-step-big.dead-step{color:var(--lose)}
.reto-step-sub{font-size:11px;color:var(--cream3);margin-bottom:10px}
.reto-label-inp{
  width:100%;background:transparent;border:none;
  border-bottom:1px dashed var(--border2);
  color:var(--gold2);font-size:12px;font-weight:500;
  padding:3px 2px 5px;margin-bottom:10px;
  transition:.2s;font-family:'Inter',sans-serif;
}
.reto-label-inp::placeholder{color:var(--cream3);font-style:italic;font-weight:400}
.reto-label-inp:focus{border-bottom-color:var(--gold);outline:none}
.reto-banca{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--felt3);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;margin-bottom:8px;
}
.reto-banca-lbl{font-size:9px;color:var(--cream3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.reto-banca-val{font-size:15px;font-weight:600;color:var(--gold2);font-family:'DM Mono',monospace;letter-spacing:-.3px}
.progress-track{background:var(--felt4);border-radius:4px;height:3px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:3px;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.reto-withdrawn{font-size:10px;color:var(--amber);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.reto-odds-hist{font-size:10px;color:var(--cream3);font-family:'DM Mono',monospace;margin-bottom:8px;word-break:break-word;line-height:1.4}
.reto-actions{display:flex;gap:5px}
.btn-win{
  flex:1;
  background:var(--win-bg);border:1px solid var(--win-border);
  border-radius:var(--rs);color:var(--win);
  padding:7px 4px;font-size:11px;font-weight:700;
  transition:.15s;letter-spacing:.03em;
}
.btn-win:hover{background:var(--win2);color:#000;border-color:var(--win2);box-shadow:0 0 12px rgba(0,230,118,.3)}
.btn-lose{
  flex:1;
  background:var(--lose-bg);border:1px solid var(--lose-border);
  border-radius:var(--rs);color:var(--lose);
  padding:7px 4px;font-size:11px;font-weight:700;
  transition:.15s;letter-spacing:.03em;
}
.btn-lose:hover{background:var(--lose2);color:#fff;border-color:var(--lose2);box-shadow:0 0 12px rgba(255,82,82,.3)}
.btn-sm{
  width:30px;height:30px;flex-shrink:0;
  border:1px solid var(--border2);border-radius:var(--rs);
  color:var(--cream3);font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.btn-sm:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
.btn-sm.danger:hover{border-color:var(--lose-border);color:var(--lose);background:var(--lose-bg)}
.btn-sm.purple:hover{border-color:rgba(155,109,255,.4);color:var(--purple);background:var(--purple-bg)}
.btn-sm.wide{width:auto;padding:0 10px;gap:4px}

.add-reto-card{
  background:transparent;
  border:1px dashed var(--border2);
  border-radius:var(--r);
  padding:14px 15px;color:var(--cream3);
  font-size:12px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  cursor:pointer;transition:.2s;min-height:120px;
}
.add-reto-card:hover{border-color:var(--gold3);color:var(--gold);background:var(--gold-bg)}
.add-reto-plus{
  width:32px;height:32px;border-radius:50%;
  border:1.5px dashed currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:300;
}

/* ── FREE BETS ── */
.btn-add-bet{
  background:linear-gradient(135deg,var(--blue),#3b6fd4);
  border:none;border-radius:var(--rs);
  color:#fff;padding:8px 18px;font-size:12px;font-weight:700;
  margin-bottom:16px;transition:.2s;
  display:inline-flex;align-items:center;gap:7px;
  box-shadow:0 4px 14px rgba(91,141,238,.3);
  letter-spacing:.03em;
}
.btn-add-bet:hover{box-shadow:0 6px 20px rgba(91,141,238,.45);transform:translateY(-1px)}
.bets-table-wrap{
  background:var(--felt2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;overflow-x:auto;
}
.bets-table{width:100%;border-collapse:collapse;min-width:600px}
.bets-table th{
  font-size:9px;color:var(--gold3);text-align:left;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(212,175,55,.05);
  text-transform:uppercase;letter-spacing:.1em;font-weight:700;white-space:nowrap;
}
.bets-table td{
  padding:7px 10px;
  border-bottom:1px solid var(--border);
  background:transparent;vertical-align:middle;
}
.bets-table tr:last-child td{border-bottom:none}
.bets-table tr:hover td{background:var(--felt3)}
.td-inp{
  background:transparent;border:none;color:var(--cream);
  padding:3px 6px;width:100%;border-radius:6px;
  transition:.15s;font-weight:500;
}
.td-inp:focus{background:var(--felt3);border:1px solid var(--border-gold);box-shadow:0 0 0 2px rgba(212,175,55,.1)}
.td-sel{background:transparent;border:none;color:var(--cream);padding:3px 4px;width:100%;font-weight:500}
.td-sel:focus{background:var(--felt3)}
.pnl-pos{color:var(--win);font-weight:700;font-family:'DM Mono',monospace}.pnl-neg{color:var(--lose);font-weight:700;font-family:'DM Mono',monospace}
.pnl-nil{color:var(--cream3);font-family:'DM Mono',monospace}
.cashout-tag{display:block;font-size:10px;color:var(--amber);font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;margin-top:2px;opacity:.85;transition:.15s}
.cashout-tag:hover{opacity:1;text-decoration:underline}

/* ── GLOBAL VIEW ── */
.global-hero{
  background:linear-gradient(135deg,#0e4a36 0%,#155f47 100%);
  border:1px solid var(--border-gold);
  border-radius:16px;
  padding:26px 28px;
  margin-bottom:22px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-gold);
}
.global-hero::before{
  content:'♠  ♦  ♣  ♥';
  position:absolute;right:24px;top:50%;transform:translateY(-50%);
  font-size:28px;letter-spacing:16px;
  color:rgba(212,175,55,.08);
  pointer-events:none;
}
.hero-grid{display:flex;align-items:center;gap:0;flex-wrap:wrap}
.hero-item{padding:0 28px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.hero-item:first-child{padding-left:0}
.hero-item+.hero-item{border-left:1px solid var(--border-gold)}
.hero-lbl{font-size:10px;color:var(--cream3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.hero-val{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;line-height:1}
.hero-val.pos{color:var(--gold2)}
.hero-val.neg{color:var(--lose)}
.hero-val.neutral{color:var(--cream)}
.hero-val.sm{font-size:22px}

.strat-list-card{
  background:var(--felt2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:16px;
}
.strat-list-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:.15s;gap:14px;
}
.strat-list-row:last-child{border-bottom:none}
.strat-list-row:hover{background:var(--felt3)}
.strat-row-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  border:1px solid var(--border2);
}
.strat-row-icon.reto{background:var(--purple-bg);border-color:rgba(155,109,255,.2)}
.strat-row-icon.libre{background:var(--blue-bg);border-color:rgba(91,141,238,.2)}
.strat-row-body{flex:1;display:flex;flex-direction:column;gap:2px}
.strat-row-name{font-weight:600;font-size:13px;color:var(--cream)}
.strat-row-sub{font-size:11px;color:var(--cream3)}
.strat-row-right{text-align:right;flex-shrink:0}
.strat-row-pnl{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.strat-row-inv{font-size:10px;color:var(--cream3);margin-top:2px}
.arrow-right{color:var(--border2);font-size:18px;font-weight:300}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 24px}
.empty-suits{font-size:32px;letter-spacing:12px;color:var(--border2);margin-bottom:16px}
.empty-msg{font-size:14px;color:var(--cream3);margin-bottom:22px;font-weight:400}
.btn-new{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  color:#0a1510;border:none;border-radius:var(--rs);
  padding:10px 28px;font-size:13px;font-weight:700;
  transition:.2s;letter-spacing:.05em;
  box-shadow:0 4px 16px rgba(212,175,55,.3);
}
.btn-new:hover{box-shadow:0 6px 24px rgba(212,175,55,.5);transform:translateY(-1px)}

/* ── TOOLBAR LIBRE ── */
.libre-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.libre-filters{display:flex;gap:8px}
.filter-sel{
  background:var(--felt2);border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream2);
  padding:7px 11px;font-size:12px;font-weight:500;transition:.2s;cursor:pointer;
}
.filter-sel:focus,.filter-sel:hover{border-color:var(--gold);color:var(--cream)}

/* ── HISTORIAL ── */
.strat-name-static{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--cream);letter-spacing:.3px}
.hist-tab.active{color:var(--gold)!important;border-bottom-color:var(--gold)!important}
.hist-tab.active .tab-dot{background:var(--gold)}
.hist-chart{
  background:var(--felt2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;margin-bottom:18px;
}
.hist-chart-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--cream3);margin-top:6px;font-family:'DM Mono',monospace}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-row{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--felt2);border:1px solid var(--border);
  border-radius:var(--rs);padding:10px 14px;gap:12px;
}
.hist-row-left{display:flex;flex-direction:column;gap:2px;min-width:0}
.hist-desc{font-size:13px;color:var(--cream);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-date{font-size:11px;color:var(--cream3);font-family:'DM Mono',monospace}
.hist-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.hist-delta{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.hist-delta.pos{color:var(--win)}
.hist-delta.neg{color:var(--lose)}
.hist-saldo{font-size:10px;color:var(--cream3);font-family:'DM Mono',monospace}

/* ── SNACK ── */
.snack{
  position:fixed;bottom:24px;right:24px;
  background:var(--felt2);color:var(--cream);
  border:1px solid var(--border-gold);
  border-radius:var(--rs);
  padding:10px 18px;font-size:12px;font-weight:500;
  z-index:9999;
  opacity:0;transform:translateY(10px);
  transition:opacity .22s,transform .22s;
  pointer-events:none;max-width:320px;
  box-shadow:var(--shadow),var(--shadow-gold);
}
.snack.show{opacity:1;transform:translateY(0)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  z-index:9000;padding:20px;
}
.modal-box{
  background:var(--felt2);
  border:1px solid var(--border-gold);
  border-radius:16px;
  padding:28px;
  width:100%;max-width:400px;
  box-shadow:var(--shadow),var(--shadow-gold);
  animation:mIn .22s cubic-bezier(.34,1.4,.64,1);
  position:relative;overflow:hidden;
}
.modal-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
.modal-title{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;color:var(--cream);
  margin-bottom:22px;letter-spacing:.2px;
}
.modal-field{margin-bottom:16px}
.modal-lbl{font-size:10px;color:var(--gold3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
.modal-inp{
  background:var(--felt3);border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream);
  padding:9px 12px;width:100%;font-size:14px;font-weight:500;transition:.2s;
}
.modal-inp:focus{border-color:var(--gold);background:var(--felt4);box-shadow:0 0 0 3px rgba(212,175,55,.12)}
.modal-sel{
  background:var(--felt3);border:1px solid var(--border2);
  border-radius:var(--rs);color:var(--cream);
  padding:9px 12px;width:100%;font-size:14px;font-weight:500;
}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.btn-confirm{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  color:#0a1510;border:none;border-radius:var(--rs);
  padding:9px 24px;font-size:13px;font-weight:700;
  transition:.15s;letter-spacing:.05em;
}
.btn-confirm:hover{box-shadow:0 4px 16px rgba(212,175,55,.4)}
.btn-cancel{
  background:var(--felt3);border:1px solid var(--border2);
  color:var(--cream3);border-radius:var(--rs);
  padding:9px 18px;font-size:13px;font-weight:500;transition:.15s;
}
.btn-cancel:hover{border-color:var(--border-gold);color:var(--cream)}

/* ── COMPAT ALIASES ── */
.badge-green{background:var(--win-bg);color:var(--win);border:1px solid var(--win-border)}
.badge-red{background:var(--lose-bg);color:var(--lose);border:1px solid var(--lose-border)}
.badge-violet{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(155,109,255,.3)}

/* ── DIVIDER ── */
.section-sep{
  height:1px;
  background:linear-gradient(90deg,var(--border),var(--border2),var(--border));
  margin:20px 0;
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="logo">
      <span class="logo-suits">♠♦</span>
      <span class="logo-text">Bet<em>Track</em></span>
    </div>
    <div class="topbar-sep"></div>
    <span class="topbar-badge">♣ Mundial 2026 ♥</span>
    <div class="saldo-widget">
      <div class="saldo-coin">🪙</div>
      <div class="saldo-info">
        <span class="saldo-lbl">Bankroll</span>
        <span class="saldo-val pos" id="saldo-display">—</span>
        <span class="saldo-committed" id="committed-display"></span>
      </div>
      <button class="saldo-edit-btn" onclick="editSaldo()" title="Editar saldo">✎</button>
    </div>
    <div class="topbar-tools">
      <button class="tool-btn" onclick="exportData()" title="Descargar copia de seguridad">⭳ Exportar</button>
      <button class="tool-btn" onclick="importData()" title="Cargar datos desde archivo">⭱ Importar</button>
    </div>
  </div>
  <div class="tabs-nav" id="tabs-nav"></div>
  <div class="main" id="main"></div>
</div>
<div class="snack" id="snack"></div>
<script>

// ── STATE ──────────────────────────────────────────────────────────────────
let S = { saldo: 100, tab: 'global', strategies: [], history: [] };

function save(){ try{ localStorage.setItem('bettrack_v3', JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    // try v3 first, then migrate from v2
    const d3 = localStorage.getItem('bettrack_v3');
    const d2 = localStorage.getItem('bettrack_v2');
    const d = d3 || d2;
    if(d){ const p = JSON.parse(d); if(p && typeof p === 'object') S = {...S, ...p}; }
    if(!Array.isArray(S.history)) S.history=[];
  }catch(e){}
}

// Registra un movimiento del bankroll en el historial
function logMove(desc, delta){
  if(!Array.isArray(S.history)) S.history=[];
  S.history.unshift({
    id:uid(), ts:Date.now(), desc, delta:+(delta||0).toFixed(2), saldo:+(S.saldo||0).toFixed(2)
  });
  if(S.history.length>500) S.history.length=500; // cap
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function eur(n){ return (parseFloat(n)||0).toFixed(2)+'€'; }
function sign(n){ return n>=0 ? '+'+eur(n) : eur(n); }
function fmtDate(ts){
  const d=new Date(ts);
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm} ${hh}:${mi}`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gs(id){ return S.strategies.find(s=>s.id===id); }

function snack(msg, ms=2800){
  const el = document.getElementById('snack');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), ms);
}

// ── STATS ──────────────────────────────────────────────────────────────────
function retoStats(s){
  const defOdds=parseFloat(s.config?.odds)||1.5;
  let inv=0,ret=0,active=0,dead=0,completed=0,committed=0;
  (s.retos||[]).forEach(r=>{
    inv+=r.stake||0;
    if(r.dead) dead++;
    else if(r.completed){ completed++; ret+=r.finalBanca||0; }
    else {
      active++;
      if(r.withdrawn) ret+=r.withdrawn;
      // El dinero "en juego" es la banca actual del reto, no el stake inicial
      const banca=(r.banca!=null)?r.banca:(r.stake||0)*Math.pow(defOdds,r.step||0);
      committed+=banca;
    }
  });
  return {inv,ret,active,dead,completed,committed,pnl:ret-inv,total:(s.retos||[]).length};
}
function betStats(s){
  let inv=0,ret=0,wins=0,losses=0,pend=0,closed=0;
  (s.bets||[]).forEach(b=>{
    if(b.result==='win'){inv+=b.stake;ret+=b.stake*b.odds;wins++;}
    else if(b.result==='lose'){inv+=b.stake;losses++;}
    else if(b.result==='cashout'){inv+=b.stake;ret+=(b.cashout||0);closed++;}
    else pend++;
  });
  return {inv,ret,wins,losses,pend,closed,pnl:ret-inv};
}
function globalStats(){
  let inv=0,ret=0;
  S.strategies.forEach(s=>{
    const st=s.type==='reto'?retoStats(s):betStats(s);
    inv+=st.inv; ret+=st.ret;
  });
  return {inv,ret,pnl:ret-inv};
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const sv=parseFloat(S.saldo)||0;
  const sd=document.getElementById('saldo-display');
  sd.textContent=eur(sv);
  sd.className='saldo-val '+(sv>=0?'pos':'neg');

  // dinero comprometido en apuestas vivas (retos activos + apuestas libres pendientes)
  let committed=0;
  S.strategies.forEach(s=>{
    if(s.type==='reto'){ committed+=retoStats(s).committed; }
    else { (s.bets||[]).forEach(b=>{ if(b.result==='pending') committed+=(b.stake||0); }); }
  });
  const cd=document.getElementById('committed-display');
  if(cd){
    if(committed>0){ cd.textContent='⏳ '+eur(committed)+' apostado'; cd.className='saldo-committed has-val'; }
    else { cd.textContent=''; cd.className='saldo-committed'; }
  }

  const tnav=document.getElementById('tabs-nav');
  let th=`<button class="tab-btn global-tab${S.tab==='global'?' active':''}" onclick="setTab('global')"><div class="tab-dot"></div>Global</button>`;
  S.strategies.forEach(s=>{
    const ico=s.type==='reto'?'⬡':'≡';
    th+=`<button class="tab-btn${S.tab===s.id?' active':''}" onclick="setTab('${s.id}')"><div class="tab-dot"></div>${esc(s.name)}</button>`;
  });
  th+=`<button class="tab-btn hist-tab${S.tab==='history'?' active':''}" onclick="setTab('history')"><div class="tab-dot"></div>🕑 Historial</button>`;
  th+=`<button class="tab-add-btn" onclick="newStrategy()">+ Nueva</button>`;
  tnav.innerHTML=th;

  const m=document.getElementById('main');
  if(S.tab==='global') m.innerHTML=renderGlobal();
  else if(S.tab==='history') m.innerHTML=renderHistory();
  else{
    const s=gs(S.tab);
    if(!s){m.innerHTML='<div class="empty-state"><p class="empty-msg">Estrategia no encontrada.</p></div>';return;}
    m.innerHTML=s.type==='reto'?renderReto(s):renderLibre(s);
  }
}

// ── HISTORIAL ──────────────────────────────────────────────────────────────
function renderHistory(){
  const h=S.history||[];
  // Construir serie de evolución del bankroll (de más antiguo a más nuevo)
  const chron=[...h].reverse();
  let chartSvg='';
  if(chron.length>=2){
    const vals=chron.map(x=>x.saldo);
    const min=Math.min(...vals), max=Math.max(...vals);
    const range=max-min||1;
    const W=600,H=120,pad=4;
    const pts=chron.map((x,i)=>{
      const px=pad+(i/(chron.length-1))*(W-2*pad);
      const py=H-pad-((x.saldo-min)/range)*(H-2*pad);
      return `${px.toFixed(1)},${py.toFixed(1)}`;
    }).join(' ');
    const last=vals[vals.length-1], first=vals[0];
    const lineColor=last>=first?'var(--win)':'var(--lose)';
    chartSvg=`<div class="hist-chart">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:120px">
        <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <div class="hist-chart-lbl"><span>Min ${eur(min)}</span><span>Máx ${eur(max)}</span></div>
    </div>`;
  }

  const rows=h.length===0
    ?`<div class="empty-state"><div class="empty-suits">🕑</div><p class="empty-msg">Aún no hay movimientos registrados</p></div>`
    :`<div class="hist-list">`+h.map(m=>{
      const pos=m.delta>=0;
      return `<div class="hist-row">
        <div class="hist-row-left">
          <span class="hist-desc">${esc(m.desc)}</span>
          <span class="hist-date">${fmtDate(m.ts)}</span>
        </div>
        <div class="hist-row-right">
          <span class="hist-delta ${pos?'pos':'neg'}">${pos?'+':''}${eur(m.delta)}</span>
          <span class="hist-saldo">→ ${eur(m.saldo)}</span>
        </div>
      </div>`;
    }).join('')+`</div>`;

  return `
    <div class="strat-header">
      <span class="strat-name-static">Historial de movimientos</span>
      ${h.length>0?`<button class="del-strat-btn" onclick="clearHistory()">🗑 Borrar historial</button>`:''}
    </div>
    ${chartSvg}
    ${rows}
  `;
}

// ── GLOBAL ─────────────────────────────────────────────────────────────────
function renderGlobal(){
  const gst=globalStats();
  const roi=gst.inv>0?((gst.pnl/gst.inv)*100).toFixed(1):'0.0';
  const pnlC=gst.pnl>=0?'pos':'neg';

  const heroRows=`
    <div class="hero-saldo">
      <span class="hero-lbl">Saldo disponible</span>
      <span class="hero-val ${parseFloat(S.saldo)>=0?'pos':'neg'}">${eur(S.saldo)}</span>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-stat">
      <span class="hero-lbl">P&L Total</span>
      <span class="hero-val ${pnlC}" style="font-size:22px">${sign(gst.pnl)}</span>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-stat">
      <span class="hero-lbl">ROI</span>
      <span class="hero-val" style="font-size:22px;color:${parseFloat(roi)>=0?'#6ee7b7':'#fca5a5'}">${roi}%</span>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-stat">
      <span class="hero-lbl">Invertido</span>
      <span class="hero-val" style="font-size:22px;color:rgba(255,255,255,.7)">${eur(gst.inv)}</span>
    </div>
  `;

  if(S.strategies.length===0){
    return `
      <div class="global-hero">${heroRows}</div>
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p class="empty-msg">Empieza creando tu primera estrategia</p>
        <button class="btn-new" onclick="newStrategy()">+ Nueva estrategia</button>
      </div>`;
  }

  let rows='';
  S.strategies.forEach(s=>{
    const st=s.type==='reto'?retoStats(s):betStats(s);
    const pc=st.pnl>=0?'var(--emerald)':'var(--rose)';
    const sub=s.type==='reto'
      ?`${st.active} activos · ${st.dead} muertos · ${st.completed} completados`
      :`${st.wins} ganadas · ${st.losses} perdidas · ${st.pend||0} pendientes`;
    rows+=`<div class="strat-list-row" onclick="setTab('${s.id}')">
      <div class="strat-row-icon ${s.type}">${s.type==='reto'?'🔗':'📋'}</div>
      <div class="strat-row-body">
        <span class="strat-row-name">${esc(s.name)}</span>
        <span class="strat-row-sub">${sub}</span>
      </div>
      <div class="strat-row-right">
        <div class="strat-row-pnl" style="color:${pc}">${sign(st.pnl)}</div>
        <div class="strat-row-inv">Inv: ${eur(st.inv)}</div>
      </div>
      <span class="arrow-right">›</span>
    </div>`;
  });

  return `
    <div class="global-hero">${heroRows}</div>
    <div class="sec-title">Estrategias activas</div>
    <div class="strat-list-card">${rows}</div>
    <div style="text-align:center;margin-top:4px">
      <button class="btn-new" onclick="newStrategy()">+ Nueva estrategia</button>
    </div>`;
}

// ── RETO VIEW ──────────────────────────────────────────────────────────────
function renderReto(s){
  const cfg=s.config||{};
  const stake=parseFloat(cfg.stake)||10;
  const odds=parseFloat(cfg.odds)||1.50;
  const target=parseInt(cfg.target)||12;
  const wStep=parseInt(cfg.withdrawStep)||7;
  const st=retoStats(s);
  const pnlC=st.pnl>=0?'var(--emerald)':'var(--rose)';

  let cards=(s.retos||[]).map(r=>{
    const rStake=parseFloat(r.stake)||stake;
    const banca=(r.banca!=null)?r.banca:rStake*Math.pow(odds,r.step);
    const pct=Math.min((r.step/target)*100,100);
    const isWarn=!r.dead&&!r.completed&&r.step>=wStep;
    const stepClass=r.dead?'dead-step':isWarn?'warn-step':'alive';
    const barColor=r.dead?'var(--rose)':r.completed?'var(--amber)':isWarn?'var(--amber)':'var(--emerald)';
    const statusBadge=r.dead?'<span class="badge badge-red">Muerto</span>':
      r.completed?'<span class="badge badge-amber">✓ Completo</span>':
      isWarn?'<span class="badge badge-amber">Retirar</span>':
      '<span class="badge badge-green">Activo</span>';
    const withdrawn=r.withdrawn?`<div class="reto-withdrawn">↑ Retirado: ${eur(r.withdrawn)}</div>`:'';
    const lastOdds=(Array.isArray(r.stepOdds)&&r.stepOdds.length)?r.stepOdds[r.stepOdds.length-1]:null;
    const oddsHistory=(Array.isArray(r.stepOdds)&&r.stepOdds.length)?`<div class="reto-odds-hist">cuotas: ${r.stepOdds.map(o=>o.toFixed(2)).join(' × ')}</div>`:'';
    let actions='';
    if(!r.dead&&!r.completed){
      const undoBtn=r.step>0?`<button class="btn-sm" onclick="rUndo('${s.id}','${r.id}')" title="Deshacer última ganada">↶</button>`:'';
      actions=`<div class="reto-actions">
        <button class="btn-win" onclick="rWin('${s.id}','${r.id}')">✓ Gana</button>
        <button class="btn-lose" onclick="rLose('${s.id}','${r.id}')">✗ Pierde</button>
        ${undoBtn}
        <button class="btn-sm" onclick="rWithdraw('${s.id}','${r.id}')" title="Retirar parcial">↑</button>
        <button class="btn-sm danger" onclick="rDelete('${s.id}','${r.id}')" title="Eliminar">✕</button>
      </div>`;
    } else {
      actions=`<div class="reto-actions">
        <button class="btn-sm purple wide" onclick="rReset('${s.id}','${r.id}')" title="Reiniciar">↺ Reset</button>
        <button class="btn-sm danger" onclick="rDelete('${s.id}','${r.id}')" title="Eliminar">✕</button>
      </div>`;
    }
    return `<div class="reto-card${r.dead?' dead':r.completed?' completed':isWarn?' warn-card':''}">
      <div class="reto-card-corner">${['♠','♦','♣','♥'][r.num%4]}</div>
      <div class="reto-top"><span class="reto-num">Reto #${r.num}</span>${statusBadge}</div>
      <input class="reto-label-inp" value="${esc(r.label||'')}" placeholder="+ Añadir partido / apuesta" onchange="rLabel('${s.id}','${r.id}',this.value)">
      <div class="reto-step-big ${stepClass}">P${r.step}</div>

      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      ${withdrawn}
      ${actions}

  }).join('');

  cards+=`<div class="add-reto-card" onclick="rAdd('${s.id}')">
    <span class="add-reto-plus">+</span> Añadir reto
  </div>`;

  const warnSaldo=S.saldo<stake;
  return `
    <div class="strat-header">
      <input class="strat-name-inp" value="${esc(s.name)}" onchange="renameS('${s.id}',this.value)">

    <div class="config-bar">
      <div class="cfg-grp">
        <span class="cfg-lbl">Stake inicial €</span>

      </div>
      <div class="cfg-grp">
        <span class="cfg-lbl">Cuota</span>
        <input class="cfg-inp" type="number" step="0.05" min="1.05" value="${odds}" onchange="upCfg('${s.id}','odds',this.value)">

      <div class="cfg-grp">

// ── LIBRE VIEW ──────────────────────────────────────────────────────────────
function renderLibre(s){
  const st=betStats(s);
  const pnlC=st.pnl>=0?'var(--emerald)':'var(--rose)';
  const wr=(st.wins+st.losses)>0?Math.round(st.wins/(st.wins+st.losses)*100)+'%':'—';

  // filtro y orden (guardados en la estrategia)
  const filter=s.betFilter||'all';
  const sort=s.betSort||'recent';
  let list=[...(s.bets||[])];
  if(filter!=='all') list=list.filter(b=>b.result===filter);
  if(sort==='recent') list.sort((a,b)=>(b.ts||0)-(a.ts||0));
  else if(sort==='old') list.sort((a,b)=>(a.ts||0)-(b.ts||0));
  else if(sort==='pnl'){
    const pf=b=>b.result==='win'?b.stake*(b.odds-1):b.result==='lose'?-b.stake:b.result==='cashout'?(b.cashout||0)-b.stake:0;
    list.sort((a,b)=>pf(b)-pf(a));
  }

  const rows=list.length===0
    ?`<tr><td colspan="9" style="text-align:center;padding:36px;color:var(--cream3);font-weight:500">${(s.bets||[]).length===0?'Sin apuestas — pulsa Añadir para empezar':'Ninguna apuesta con este filtro'}</td></tr>`
    :list.map(b=>{
      let profit;
      if(b.result==='win') profit=b.stake*(b.odds-1);
      else if(b.result==='lose') profit=-b.stake;
      else if(b.result==='cashout') profit=(b.cashout||0)-b.stake;
      else profit=null;
      const pClass=profit===null?'pnl-nil':profit>=0?'pnl-pos':'pnl-neg';
      const pTxt=profit===null?'—':(profit>=0?'+':'')+eur(profit);
      const resSel=['pending','win','lose','cashout'].map(v=>
        `<option value="${v}"${b.result===v?' selected':''}>${v==='pending'?'⏳ Pendiente':v==='win'?'✅ Ganada':v==='lose'?'❌ Perdida':'💰 Cerrada'}</option>`
      ).join('');
      const rowBg=b.result==='win'?'background:rgba(0,230,118,.05)':b.result==='lose'?'background:rgba(255,91,91,.05)':b.result==='cashout'?'background:rgba(255,181,46,.05)':'';
      const cashoutInfo=b.result==='cashout'?`<span class="cashout-tag" onclick="editCashout('${s.id}','${b.id}')" title="Editar cierre">cierre: ${eur(b.cashout||0)} ✎</span>`:'';
      const dateStr=b.ts?fmtDate(b.ts):'—';
      return `<tr style="${rowBg}">
        <td style="font-size:11px;color:var(--cream3);font-family:'DM Mono',monospace;white-space:nowrap">${dateStr}</td>
        <td><input class="td-inp" value="${esc(b.desc)}" placeholder="Partido..." onchange="upBet('${s.id}','${b.id}','desc',this.value)" style="min-width:110px"></td>
        <td><input class="td-inp" type="number" step="0.5" min="0" value="${b.stake}" onchange="upBet('${s.id}','${b.id}','stake',this.value)" style="width:68px;font-family:'DM Mono',monospace"></td>
        <td><input class="td-inp" type="number" step="0.05" min="1" value="${b.odds}" onchange="upBet('${s.id}','${b.id}','odds',this.value)" style="width:62px;font-family:'DM Mono',monospace"></td>
        <td><input class="td-inp" value="${esc(b.market)}" placeholder="Over 2.5..." onchange="upBet('${s.id}','${b.id}','market',this.value)" style="width:88px"></td>
        <td><input class="td-inp" value="${esc(b.note||'')}" placeholder="Nota..." onchange="upBet('${s.id}','${b.id}','note',this.value)" style="width:80px"></td>
        <td><select class="td-sel" onchange="upBet('${s.id}','${b.id}','result',this.value)" style="width:128px">${resSel}</select></td>
        <td class="${pClass}" style="white-space:nowrap;font-size:13px">${pTxt}${cashoutInfo}</td>
        <td><button class="btn-sm danger" onclick="delBet('${s.id}','${b.id}')" style="width:26px;height:26px">✕</button></td>
      </tr>`;
    }).join('');

  return `
    <div class="strat-header">
      <input class="strat-name-inp" value="${esc(s.name)}" onchange="renameS('${s.id}',this.value)">
      <span class="badge badge-blue">Apuestas libres</span>
      <button class="del-strat-btn" onclick="delStrategy('${s.id}')">🗑 Eliminar</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:${pnlC}">${sign(st.pnl)}</div><div class="stat-lbl">P&L</div></div>
      <div class="stat-card"><div class="stat-val">${eur(st.inv)}</div><div class="stat-lbl">Invertido</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--emerald)">${st.wins}</div><div class="stat-lbl">Ganadas</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--rose)">${st.losses}</div><div class="stat-lbl">Perdidas</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${st.closed}</div><div class="stat-lbl">Cerradas</div></div>
      <div class="stat-card"><div class="stat-val">${wr}</div><div class="stat-lbl">Win rate</div></div>
    </div>

    <div class="libre-toolbar">
      <button class="btn-add-bet" onclick="addBet('${s.id}')">+ Añadir apuesta</button>
      <div class="libre-filters">
        <select class="filter-sel" onchange="setBetFilter('${s.id}',this.value)">
          <option value="all"${filter==='all'?' selected':''}>Todas</option>
          <option value="pending"${filter==='pending'?' selected':''}>⏳ Pendientes</option>
          <option value="win"${filter==='win'?' selected':''}>✅ Ganadas</option>
          <option value="lose"${filter==='lose'?' selected':''}>❌ Perdidas</option>
          <option value="cashout"${filter==='cashout'?' selected':''}>💰 Cerradas</option>
        </select>
        <select class="filter-sel" onchange="setBetSort('${s.id}',this.value)">
          <option value="recent"${sort==='recent'?' selected':''}>Más recientes</option>
          <option value="old"${sort==='old'?' selected':''}>Más antiguas</option>
          <option value="pnl"${sort==='pnl'?' selected':''}>Por P&L</option>
        </select>
      </div>
    </div>

    <div class="bets-table-wrap">
      <table class="bets-table">
        <thead><tr>
          <th>Fecha</th><th>Descripción</th><th>Stake €</th><th>Cuota</th>
          <th>Mercado</th><th>Nota</th><th>Resultado</th><th>P&L</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function setTab(id){S.tab=id;render();}
function setBetFilter(sid,v){const s=gs(sid);if(s){s.betFilter=v;save();render();}}
function setBetSort(sid,v){const s=gs(sid);if(s){s.betSort=v;save();render();}}

function editSaldo(){
  modal('Editar saldo',[{id:'v',label:'Saldo disponible (€)',type:'number',val:S.saldo}],
    d=>{const v=parseFloat(d.v);if(!isNaN(v)){const old=S.saldo;S.saldo=+v.toFixed(2);logMove('Ajuste manual de saldo',S.saldo-old);save();render();}});
}

function newStrategy(){
  modal('Nueva estrategia',[
    {id:'n',label:'Nombre',type:'text',val:'Estrategia '+(S.strategies.length+1)},
    {id:'t',label:'Tipo',type:'select',opts:[{v:'reto',l:'🔗 Reto compuesto'},{v:'libre',l:'📋 Apuestas libres'}],val:'reto'}
  ],d=>{
    const s={id:uid(),name:d.n||'Nueva',type:d.t,retos:[],bets:[],
      config:{stake:10,odds:1.50,target:12,withdrawStep:7}};
    S.strategies.push(s);S.tab=s.id;save();render();
  });
}

function renameS(id,v){const s=gs(id);if(s){s.name=v;save();render();}}
function upCfg(id,k,v){const s=gs(id);if(s){s.config[k]=parseFloat(v)||0;save();render();}}

function delStrategy(id){
  if(!confirm('¿Eliminar esta estrategia y todos sus datos?'))return;
  S.strategies=S.strategies.filter(s=>s.id!==id);
  S.tab='global';save();render();
}

function rAdd(sid){
  const s=gs(sid);if(!s)return;
  const stake=parseFloat(s.config.stake)||10;
  if(S.saldo<stake){snack('⚠️ Saldo insuficiente para este stake');return;}
  S.saldo=+(S.saldo-stake).toFixed(2);
  const num=(s.retos.length+1);
  s.retos.push({id:uid(),num,step:0,stake,banca:stake,stepOdds:[],dead:false,completed:false,withdrawn:0,finalBanca:0,started:true,label:''});
  logMove(`${s.name} · Reto #${num} creado`,-stake);
  save();render();snack(`Reto #${num} creado — ${eur(stake)} comprometidos`);
}

function rWin(sid,rid){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r||r.dead||r.completed)return;
  const defOdds=parseFloat(s.config.odds)||1.5;
  const target=parseInt(s.config.target)||12;
  const curBanca=(r.banca!=null)?r.banca:r.stake*Math.pow(defOdds,r.step);
  // Pedir la cuota real de esta apuesta concreta
  modal(`✓ Ganada — Reto #${r.num} · Paso ${r.step+1}`,[
    {id:'o',label:`Banca actual ${eur(curBanca)}. ¿A qué cuota fue esta apuesta?`,type:'number',val:defOdds.toFixed(2)}
  ],d=>{
    const o=parseFloat(d.o);
    if(isNaN(o)||o<=1){snack('Cuota inválida (debe ser > 1)');return;}
    if(!Array.isArray(r.stepOdds)) r.stepOdds=[];
    r.stepOdds.push(o);
    r.banca=+(curBanca*o).toFixed(2);
    r.step++;
    if(r.step>=target){
      r.completed=true;r.finalBanca=r.banca;
      const net=r.banca-(r.withdrawn||0);
      S.saldo=+(S.saldo+net).toFixed(2);
      logMove(`${s.name} · Reto #${r.num} completado (P${r.step})`,net);
      snack(`🏆 Reto #${r.num} completado! +${eur(r.banca)}`);
    } else {
      snack(`✅ Reto #${r.num} → Paso ${r.step} · Banca: ${eur(r.banca)} (cuota ${o})`);
    }
    save();render();
  });
}

function rLose(sid,rid){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r||r.dead||r.completed)return;
  r.dead=true;
  snack(`❌ Reto #${r.num} muerto en paso ${r.step}`);
  save();render();
}

function rUndo(sid,rid){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r||r.step<=0)return;
  // deshacer la última cuota aplicada
  if(Array.isArray(r.stepOdds)&&r.stepOdds.length){
    const lastO=r.stepOdds.pop();
    r.banca=+(r.banca/lastO).toFixed(2);
  }
  r.step--;
  // si estaba completado, revertir el ingreso al saldo
  if(r.completed){
    const net=(r.finalBanca||0)-(r.withdrawn||0);
    S.saldo=+(S.saldo-net).toFixed(2);
    r.completed=false;r.finalBanca=0;
    logMove(`${s.name} · Reto #${r.num} deshecho`,-net);
  }
  snack(`↶ Reto #${r.num} → Paso ${r.step}`);
  save();render();
}

function rWithdraw(sid,rid){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r||r.dead||r.completed)return;
  const defOdds=parseFloat(s.config.odds)||1.5;
  const banca=(r.banca!=null)?r.banca:r.stake*Math.pow(defOdds,r.step);
  modal(`Retirar parcial — Reto #${r.num}`,[
    {id:'p',label:`Banca actual: ${eur(banca)} · % a retirar`,type:'number',val:50}
  ],d=>{
    const pct=parseFloat(d.p)||0;
    if(pct<=0||pct>100){snack('Porcentaje inválido');return;}
    const amount=+(banca*(pct/100)).toFixed(2);
    r.withdrawn=(r.withdrawn||0)+amount;
    S.saldo=+(S.saldo+amount).toFixed(2);
    logMove(`${s.name} · Retirada parcial Reto #${r.num}`,amount);
    snack(`↑ ${eur(amount)} retirados del Reto #${r.num}`);
    save();render();
  });
}

function rReset(sid,rid){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r)return;
  const stake=parseFloat(s.config.stake)||10;
  if(S.saldo<stake){snack('⚠️ Saldo insuficiente para reiniciar');return;}
  S.saldo=+(S.saldo-stake).toFixed(2);
  r.stake=stake;r.banca=stake;r.stepOdds=[];r.step=0;r.dead=false;r.completed=false;r.withdrawn=0;r.finalBanca=0;r.started=true;
  logMove(`${s.name} · Reto #${r.num} reiniciado`,-stake);
  snack(`↺ Reto #${r.num} reiniciado — ${eur(stake)} comprometidos`);
  save();render();
}

function rLabel(sid,rid,val){
  const s=gs(sid);const r=s?.retos.find(r=>r.id===rid);
  if(!r)return;
  r.label=val;
  save();
}

function rDelete(sid,rid){
  const s=gs(sid);if(!s)return;
  s.retos=s.retos.filter(r=>r.id!==rid);
  save();render();
}

function addBet(sid){
  const s=gs(sid);if(!s)return;
  const stake=10;
  if(S.saldo<stake){snack('⚠️ Saldo insuficiente');return;}
  S.saldo=+(S.saldo-stake).toFixed(2);
  s.bets.unshift({id:uid(),ts:Date.now(),desc:'',stake,odds:1.50,market:'',note:'',result:'pending'});
  logMove(`${s.name} · Apuesta creada`,-stake);
  save();render();snack(`Apuesta creada — ${eur(stake)} comprometidos`);
}

// Devuelve el ajuste de saldo que aportó un resultado concreto (para revertirlo)
function betEffect(b, result){
  if(result==='win') return b.stake*b.odds;        // sumó el retorno bruto
  if(result==='cashout') return b.cashout||0;       // sumó el valor de cierre
  return 0;                                          // pending y lose no suman nada (stake ya salió al crear)
}

function upBet(sid,bid,key,val){
  const s=gs(sid);const b=s?.bets.find(b=>b.id===bid);
  if(!b)return;
  const prevResult=b.result;
  const prevStake=b.stake;
  const prevOdds=b.odds;

  // Ediciones de stake/odds (sin cambiar resultado)
  if(key==='stake'||key==='odds'){
    b[key]=parseFloat(val)||0;
    if(prevResult==='pending'||prevResult==='lose'){
      // ajustar el stake comprometido en la banca
      if(key==='stake'){ const diff=b.stake-prevStake; S.saldo=+(S.saldo-diff).toFixed(2); }
    } else if(prevResult==='win'){
      const oldReturn=prevStake*prevOdds, newReturn=b.stake*b.odds;
      S.saldo=+(S.saldo-oldReturn+newReturn).toFixed(2);
    }
    save();render();return;
  }

  // Cambio de RESULTADO
  if(key==='result'){
    const betName=b.desc||'Apuesta';
    // Caso especial: cerrar la apuesta → pedir el valor de cierre
    if(val==='cashout'){
      const banca=b.stake*b.odds;
      modal('💰 Cerrar apuesta (cash out)',[
        {id:'c',label:`Stake ${eur(b.stake)} · cuota ${b.odds} (ganancia total sería ${eur(banca)}). ¿Cuánto te devuelve la casa al cerrar?`,type:'number',val:(b.cashout||b.stake).toFixed(2)}
      ],d=>{
        const cash=parseFloat(d.c);
        if(isNaN(cash)||cash<0){snack('Valor inválido');return;}
        // revertir efecto anterior y aplicar el cierre
        S.saldo=+(S.saldo-betEffect(b,prevResult)+cash).toFixed(2);
        b.result='cashout'; b.cashout=+cash.toFixed(2);
        const pnl=cash-b.stake;
        logMove(`${s.name} · ${betName} cerrada`,cash-betEffect(b,prevResult));
        snack(`💰 Cerrada en ${eur(cash)} · ${pnl>=0?'+':''}${eur(pnl)}`);
        save();render();
      });
      return; // no aplicamos cambios hasta confirmar el modal
    }
    // Resto de transiciones: revertir lo anterior, aplicar lo nuevo
    const before=S.saldo;
    S.saldo=+(S.saldo-betEffect(b,prevResult)).toFixed(2);
    if(prevResult==='cashout') b.cashout=0;
    b.result=val;
    S.saldo=+(S.saldo+betEffect(b,val)).toFixed(2);
    const delta=+(S.saldo-before).toFixed(2);
    const resLbl=val==='win'?'ganada':val==='lose'?'perdida':'pendiente';
    if(delta!==0) logMove(`${s.name} · ${betName} ${resLbl}`,delta);
    save();render();return;
  }

  // Otros campos (desc, market, note)
  b[key]=val;
  save();render();
}

function editCashout(sid,bid){
  const s=gs(sid);const b=s?.bets.find(b=>b.id===bid);
  if(!b||b.result!=='cashout')return;
  modal('💰 Editar valor de cierre',[
    {id:'c',label:`Stake ${eur(b.stake)}. Valor que te devolvió la casa:`,type:'number',val:(b.cashout||0).toFixed(2)}
  ],d=>{
    const cash=parseFloat(d.c);
    if(isNaN(cash)||cash<0){snack('Valor inválido');return;}
    S.saldo=+(S.saldo-(b.cashout||0)+cash).toFixed(2);
    b.cashout=+cash.toFixed(2);
    const pnl=cash-b.stake;
    snack(`Cierre actualizado · ${pnl>=0?'+':''}${eur(pnl)}`);
    save();render();
  });
}

function delBet(sid,bid){
  const s=gs(sid);if(!s)return;
  const b=s.bets.find(b=>b.id===bid);
  if(b){
    if(b.result==='pending'){S.saldo=+(S.saldo+b.stake).toFixed(2);}        // devolver stake comprometido
    else if(b.result==='win'){S.saldo=+(S.saldo-b.stake*b.odds).toFixed(2);} // quitar el retorno que sumó
    else if(b.result==='cashout'){S.saldo=+(S.saldo-(b.cashout||0)).toFixed(2);} // quitar el cierre que sumó
    // perdida: el stake ya está perdido, no se devuelve nada
  }
  s.bets=s.bets.filter(b=>b.id!==bid);
  save();render();
}

// ── EXPORTAR / IMPORTAR ─────────────────────────────────────────────────────
function exportData(){
  try{
    const data=JSON.stringify(S,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date();
    const stamp=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    a.href=url; a.download=`bettrack_backup_${stamp}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    snack('✓ Copia de seguridad descargada');
  }catch(e){ snack('⚠️ Error al exportar'); }
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data||typeof data!=='object'||!('saldo' in data)){snack('⚠️ Archivo no válido');return;}
        modal('Importar datos',[
          {id:'m',label:'¿Cómo quieres importar?',type:'select',opts:[
            {v:'replace',l:'Reemplazar todo (borra lo actual)'},
            {v:'merge',l:'Añadir estrategias a las actuales'}
          ],val:'replace'}
        ],d=>{
          if(d.m==='replace'){
            S={saldo:data.saldo||0,tab:'global',strategies:data.strategies||[],history:data.history||[]};
          } else {
            // merge: añade estrategias con nuevos ids
            (data.strategies||[]).forEach(st=>{
              st.id=uid(); S.strategies.push(st);
            });
            S.saldo=+(S.saldo+(data.saldo||0)).toFixed(2);
          }
          if(!Array.isArray(S.history)) S.history=[];
          save();render();
          snack('✓ Datos importados correctamente');
        });
      }catch(err){ snack('⚠️ No se pudo leer el archivo'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function clearHistory(){
  if(!confirm('¿Borrar el historial de movimientos? (no afecta a tus apuestas ni al saldo)'))return;
  S.history=[]; save(); render(); snack('Historial borrado');
}

// ── MODAL ──────────────────────────────────────────────────────────────────
let _mcb=null, _mfields=[];
function modal(title,fields,cb){
  document.getElementById('_modal')?.remove();
  _mcb=cb; _mfields=fields;
  const bg=document.createElement('div');
  bg.className='modal-bg';bg.id='_modal';
  const box=document.createElement('div');
  box.className='modal-box';
  box.onclick=e=>e.stopPropagation();
  // title
  const ttl=document.createElement('div');
  ttl.className='modal-title';ttl.textContent=title;
  box.appendChild(ttl);
  // fields
  fields.forEach(f=>{
    const wrap=document.createElement('div');wrap.className='modal-field';
    const lbl=document.createElement('label');lbl.className='modal-label';lbl.textContent=f.label;
    wrap.appendChild(lbl);
    if(f.type==='select'){
      const sel=document.createElement('select');sel.className='modal-sel';sel.id='_f_'+f.id;
      (f.opts||[]).forEach(o=>{
        const opt=document.createElement('option');opt.value=o.v;opt.textContent=o.l;
        if(f.val===o.v)opt.selected=true;sel.appendChild(opt);
      });
      wrap.appendChild(sel);
    } else {
      const inp=document.createElement('input');inp.className='modal-inp';
      inp.type=f.type;inp.id='_f_'+f.id;inp.value=f.val||'';
      if(f.type==='number')inp.step='any';
      wrap.appendChild(inp);
    }
    box.appendChild(wrap);
  });
  // buttons
  const btns=document.createElement('div');btns.className='modal-btns';
  const cancel=document.createElement('button');cancel.className='btn-cancel';cancel.textContent='Cancelar';
  cancel.onclick=()=>bg.remove();
  const confirm=document.createElement('button');confirm.className='btn-confirm';confirm.textContent='Confirmar';
  confirm.onclick=()=>_mOk();
  btns.appendChild(cancel);btns.appendChild(confirm);
  box.appendChild(btns);
  bg.appendChild(box);
  bg.onclick=()=>bg.remove();
  document.body.appendChild(bg);
  setTimeout(()=>{const f=document.getElementById('_f_'+fields[0]?.id);if(f){f.focus();try{f.select();}catch(e){}}},60);
}
function _mOk(){
  const d={};_mfields.forEach(f=>{const el=document.getElementById('_f_'+f.id);if(el)d[f.id]=el.value;});
  document.getElementById('_modal')?.remove();
  if(_mcb)_mcb(d);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('_modal')) _mOk();
  if(e.key==='Escape') document.getElementById('_modal')?.remove();
});

load();render();
</script>
